apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: block-kubearmor-service-tamper
spec:
  message: "Alert: KubeArmor service tamper detected"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  file:
    matchPaths:
    - path: /usr/lib/systemd/system/kubearmor.service
    matchDirectories:
    - dir: /opt/kubearmor/
      recursive: true
    - dir: /etc/systemd/system/multi-user.target.wants/
      recursive: true
    action: Block
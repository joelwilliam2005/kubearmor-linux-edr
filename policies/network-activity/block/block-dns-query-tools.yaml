apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: block-dns-query-tools
spec:
  message: "Alert: DNS Query Tools Blocked"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  process:
    matchPaths:
      - path: /usr/bin/dig
      - path: /usr/bin/nslookup
      - path: /usr/bin/host
    action: Block

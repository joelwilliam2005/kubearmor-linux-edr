apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: block-tcp-connection-from-directory
spec:
  message: "Alert: TCP Connection from suspicious directory"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  process:
    matchDirectories:
    - dir: /var/tmp/
      recursive: true
    action: Block
  network:
    matchProtocols:
    - protocol: tcp
    action: Block
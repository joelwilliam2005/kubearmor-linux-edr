apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: detect-service-discovery
spec:
  message: "Alert: Service Discovery Commands Used"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  process:
    matchPaths:
    - path: /usr/bin/busctl
    - path: /usr/bin/journalctl
    action: Audit
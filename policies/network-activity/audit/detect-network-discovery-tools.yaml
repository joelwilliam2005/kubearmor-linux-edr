apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: detect-network-discovery-tools
spec:
  message: "Alert: Network Discovery Tools Executed"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  process:
    matchPaths:
    - path: /usr/bin/ss
    - path: /usr/bin/ip
    action: Audit
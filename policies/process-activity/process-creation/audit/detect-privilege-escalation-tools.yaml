apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: detect-privilege-escalation-tools
spec:
  message: "Alert: Suspicious Process Created - Privilege Escalation Tools Used"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "<node-name>"
  process:
    matchPaths:
    - path: /usr/bin/sudo
    - path: /usr/bin/pkexec
    - path: /usr/sbin/capsh
    - path: /usr/sbin/getcap
    action: Audit
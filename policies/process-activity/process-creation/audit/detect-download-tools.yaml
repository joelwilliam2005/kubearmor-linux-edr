apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: detect-download-tools
spec:
  message: "Alert: Suspicious Activity - Download Tools Used"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  process:
    matchPaths:
    - path: /usr/bin/curl
    - path: /usr/bin/wget
    - path: /usr/bin/git
    action: Audit
apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: detect-download-and-transfer-tools
spec:
  message: "Alert: Download and Transfer Tools Detected"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  process:
    matchPaths:
    - path: /usr/bin/curl
    - path: /usr/bin/wget
    - path: /usr/bin/git
    - path: /usr/bin/scp
    - path: /usr/bin/sftp
    - path: /usr/bin/rsync
    - path: /usr/bin/ftp
    - path: /usr/bin/tftp
    action: Audit
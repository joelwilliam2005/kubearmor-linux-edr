apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: detect-file-directory-discovery
spec:
  message: "Alert: Suspicious Process Created - File/Directory Discovery"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "<node-name>"
  process:
    matchPaths:
    - path: /usr/bin/find
    - path: /usr/bin/ls
    - path: /usr/bin/stat
    - path: /usr/bin/du
    action: Audit
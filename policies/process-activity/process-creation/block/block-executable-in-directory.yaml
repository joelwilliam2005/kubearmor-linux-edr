apiVersion: security.kubearmor.com/v1
kind: KubeArmorHostPolicy
metadata:
  name: block-executable-in-sensitive-directory
spec:
  message: "Alert: Executable in Sensitive Directory"
  nodeSelector:
    matchLabels:
      kubearmor.io/hostname: "*"
  process:
    matchDirectories:
    - dir: /var/tmp/
      recursive: true  